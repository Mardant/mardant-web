<!-- views/pedidos.html -->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Productos a Pedido – Mardant</title>

  <link rel="icon" href="../favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="../css/estilos.css?v=11" />

  <style>
    /* ====== AJUSTES LOCALES SOLO PARA ESTA VISTA ====== */

    html, body { overflow-x: hidden; }

    :root{
      --pill-radius: 9999px;
      --card-max-mobile: 380px;
    }

    /* Píldoras coherentes con catálogo/preventa */
    .cta-pedidos{
      display:flex; justify-content:center; flex-wrap:wrap; gap:14px;
      margin: 12px auto 20px;
      padding: 0 12px;
      background: none !important;
      box-shadow: none !important;
      border: 0 !important;
      border-radius: 0 !important;
      position: relative;
    }
    .cta-pedidos::before,
    .cta-pedidos::after{ content:none !important; }

    .btn-pill{
      display:inline-flex; align-items:center; gap:10px;
      color:#fff; font-weight:800; line-height:1;
      padding:14px 22px;
      border-radius: var(--pill-radius);
      text-decoration:none;
      background:
        linear-gradient(180deg, rgba(255,255,255,.14), rgba(255,255,255,0)),
        #a8322a;
      box-shadow:0 10px 24px rgba(168,50,42,.22);
      transition:transform .15s ease, box-shadow .15s ease, filter .15s ease;
    }
    .btn-pill:hover{ transform:translateY(-1px); box-shadow:0 14px 28px rgba(23,20,17,.28); filter:saturate(1.03); }
    .btn-pill.alt{
      background:
        linear-gradient(180deg, rgba(255,255,255,.14), rgba(255,255,255,0)),
        #171411;
      box-shadow:0 10px 24px rgba(23,20,17,.24);
    }
    .btn-pill.japan{
      background:
        linear-gradient(180deg, rgba(255,255,255,.14), rgba(255,255,255,0)),
        #6f2b26;
      border:1px solid rgba(244,208,111,.28);
      box-shadow:0 10px 24px rgba(111,43,38,.22);
    }

    .titulo-seccion{ color:#171411; }
    .titulo-seccion::after{ background:#a8322a; }

    /* ====== ORDEN DE PRODUCTOS ====== */
    .pedido-order-panel{
      max-width: 1200px;
      margin: 0 auto 24px;
      padding: 0 16px;
      display:flex;
      flex-wrap:wrap;
      align-items:center;
      justify-content:center;
      gap:12px;
    }
    .pedido-order-label{
      color:#6f5b49;
      font-size:12px;
      font-weight:1000;
      letter-spacing:.08em;
      text-transform:uppercase;
    }
    .pedido-order-btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:38px;
      padding:9px 18px;
      border-radius:999px;
      background:#171411;
      color:#fffaf2;
      font:inherit;
      font-weight:900;
      border:1px solid rgba(216,198,170,.6);
      box-shadow:0 10px 22px rgba(23,20,17,.20);
      font-size:14px;
      cursor:pointer;
      transition:transform .15s ease, box-shadow .15s ease, filter .15s ease;
      white-space:nowrap;
    }
    .pedido-order-btn:hover{
      transform:translateY(-1px);
      box-shadow:0 14px 30px rgba(23,20,17,.28);
      filter:saturate(1.03);
    }
    .pedido-order-btn.is-active{
      background:linear-gradient(180deg, #b13a31, #8f2722);
      border-color:rgba(168,50,42,.42);
      box-shadow:0 10px 24px rgba(168,50,42,.22);
    }

    /* ====== PAGINACIÓN ====== */
.paginacion{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:8px;
  margin: 10px auto 40px;
  padding: 0 16px;
}
.paginacion button{
  min-width:32px;
  padding:6px 10px;
  border-radius:999px;
  border:1px solid #a8322a;
  background:#a8322a;
  color:#fff;
  font-size:14px;
  cursor:pointer;
  transition:background .15s ease, transform .15s ease, box-shadow .15s ease;
}
.paginacion button:hover:not(:disabled){
  transform:translateY(-1px);
  box-shadow:0 6px 16px rgba(0,0,0,.35);
}
.paginacion button:disabled{
  opacity:.4;
  cursor:default;
}
.paginacion button.activa{
  background:#171411;
  border-color:#171411;
  font-weight:700;
}

/* Puntos suspensivos "..." */
.paginacion .page-ellipsis{
  padding:6px 4px;
  min-width:auto;
  color:rgba(255,255,255,.7);
}

    /* ====== GRID DE PEDIDOS ====== */
    .grid-pedidos{
      display:grid;
      grid-template-columns: repeat(3, minmax(260px, 1fr));
      gap:28px;
      max-width:1200px;
      margin:0 auto 60px;
      padding:0 16px;
      box-sizing:border-box;
    }
    .grid-pedidos .producto{ width:100%; }

    @media (max-width:1100px){
      .grid-pedidos{ grid-template-columns: repeat(2, minmax(260px, 1fr)); }
    }
    @media (max-width:720px){
      .grid-pedidos{ grid-template-columns: 1fr; gap:18px; }
      .grid-pedidos .producto{
        max-width: var(--card-max-mobile);
        margin: 0 auto;
      }
      .cta-pedidos{ margin-bottom:22px; gap:10px; }
    }

    .grid-pedidos .producto img{
      display:block !important;
      width:100% !important;
      max-width:100% !important;
      height:auto !important;
      object-fit:contain !important;
      border-radius:10px;
      cursor: zoom-in;
    }

    .grid-pedidos .producto{
      padding-bottom: 22px;
    }

    .boton-cotizar{
      display:block;
      margin-top:10px;
      margin-bottom:6px;
      text-align:center;
      font-weight:900;
      letter-spacing:.04em;
      background:linear-gradient(180deg, #263b37, #162421);
      border:1px solid rgba(216,198,170,.34);
      color:#fff;
      box-shadow:0 8px 18px rgba(0,0,0,.22);
    }
    .boton-cotizar:hover{
      background:linear-gradient(180deg, #304842, #1b2b27);
      transform:translateY(-1px);
      box-shadow:0 12px 24px rgba(0,0,0,.28);
    }

    /* Lightbox coherente con catálogo */
    .lightbox{
      position:fixed; inset:0; background:rgba(0,0,0,.92);
      display:flex; align-items:center; justify-content:center;
      z-index:10000; padding:16px;
    }
    .lightbox[hidden]{ display:none !important; }
    .lightbox img{
      max-width:94vw; max-height:88vh; border-radius:12px;
      box-shadow:0 20px 40px rgba(0,0,0,.5);
    }
    .lb-close{
      position:absolute; top:10px; right:14px;
      background:transparent; border:none; color:#fff;
      font-size:36px; line-height:1; cursor:pointer; opacity:.9;
    }
    .lb-close:hover{ opacity:1; }
  </style>
</head>
<body>

  <!-- Banner -->
  <img src="https://i.imgur.com/dcPrIuh.png"
       alt="Productos a Pedido"
       style="width:100%;max-height:200px;object-fit:cover;border-bottom:3px solid #a8322a;" referrerpolicy="no-referrer" />

  <!-- Título -->
  <div class="contacto-centro">
    <h2 class="titulo-seccion">Productos a Pedido</h2>
  </div>

  <!-- Botones superiores (píldora) -->
  <div class="cta-pedidos">
    <a href="../index.html" class="btn-pill">🏠 <span>Volver al inicio</span></a>
    <a href="catalogo.html" class="btn-pill alt">🛍️ <span>Ir al catálogo</span></a>
    <a href="catalogo-japon.html" class="btn-pill japan"><span>日本</span><span>Catálogo Japón</span></a>
  </div>

  <!-- Orden de productos -->
  <div class="pedido-order-panel" id="pedidoOrdenFiltros" aria-label="Orden de productos">
    <span class="pedido-order-label">Ordenar</span>
    <button type="button" class="pedido-order-btn is-active" data-order="newest">&Uacute;ltimos a&ntilde;adidos</button>
    <button type="button" class="pedido-order-btn" data-order="oldest">M&aacute;s antiguos</button>
  </div>

  <!-- Listado de productos -->
  <div class="grid-pedidos" id="contenedor">
    <p style="text-align:center;width:100%;">Cargando productos…</p>
  </div>

  <!-- Paginación -->
  <div id="paginacion" class="paginacion"></div>

  <!-- Carrito flotante -->
  <a href="carrito.html" class="boton-carrito-flotante" title="Ver carrito 🛒">🛒</a>

  <!-- Lightbox para ver imágenes en grande -->
  <div id="lb" class="lightbox" hidden>
    <img alt="Vista ampliada">
    <button class="lb-close" aria-label="Cerrar">×</button>
  </div>

  <!-- Lógica de la página -->
  <script type="module" src="../js/pedidos.js?v=2"></script>

  <!-- Abrir lightbox al tocar cualquier imagen de una card -->
  <script>
    (function () {
      const cont = document.getElementById('contenedor');
      const lb   = document.getElementById('lb');
      const img  = lb.querySelector('img');

      cont.addEventListener('click', (e) => {
        const el = e.target;
        if (el && el.tagName === 'IMG') {
          img.src = el.src;
          lb.hidden = false;
          document.body.style.overflow = 'hidden';
        }
      });

      const close = () => {
        lb.hidden = true;
        img.src = '';
        document.body.style.overflow = '';
      };
      lb.addEventListener('click', close);
      lb.querySelector('.lb-close').addEventListener('click', (ev) => {
        ev.stopPropagation();
        close();
      });
      document.addEventListener('keydown', (ev) => {
        if (!lb.hidden && ev.key === 'Escape') close();
      });
    })();
  </script>

  <!-- Tracking (FB Pixel + GA4 + eventos) -->
  <script type="module" src="../js/tracking.js"></script>
  <script type="module" src="../js/account-widget.js?v=2"></script>
</body>
</html>
